services:
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: tde-raev
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: piscineds
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./tables.sql:/docker-entrypoint-initdb.d/tables.sql
      - /goinfre/tde-raev/DataScience/DataScience_01_DataWarehouse/subject/customer:/tmp/customer
      - /goinfre/tde-raev/DataScience/DataScience_01_DataWarehouse/subject/item:/tmp/item


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
      PGADMIN_LISTEN_ADDRESS: '0.0.0.0'
      PGADMIN_CONFIG_SERVER_MODE: 'True'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./servers.json:/pgadmin4/servers.json
      - ./pgpass:/tmp/pgpassfile
    ports:
      - "5050:80"

volumes:
  postgres_data:
  pgadmin_data:
